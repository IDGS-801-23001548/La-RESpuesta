<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La RESpuesta · Error 404</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/vaca-favicon.svg') }}">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="h-screen w-screen flex overflow-hidden">

    <!-- ══════════════════════════════
         IZQUIERDA — imagen branding
    ══════════════════════════════ -->
    <div class="relative hidden lg:flex lg:w-1/2 xl:w-3/5 h-full overflow-hidden flex-shrink-0">

        <img src="{{ url_for('static', filename='img/vaca-bw.jpg') }}"
            class="absolute inset-0 w-full h-full object-cover object-center">

        <div class="absolute inset-0 bg-gradient-to-br from-green-900/85 via-green-800/55 to-transparent"></div>

        <!-- header -->
        <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-8 py-6 z-10">
            <img src="{{ url_for('static', filename='img/logo-blanco.svg') }}" class="h-12">
            <span class="text-white/75 text-xs font-semibold tracking-widest uppercase">
                La RESpuesta
            </span>
        </div>

        <!-- mensaje lateral -->
        <div class="relative z-10 flex flex-col justify-end pb-20 px-10 w-full">
            <h2 class="text-white font-bold text-4xl xl:text-5xl leading-tight drop-shadow-lg">
                Te saliste<br>del <span class="text-green-300">rebaño</span>
            </h2>
            <p class="mt-4 text-white/60 text-sm font-light tracking-wide">
                Esta ruta no existe dentro del sistema
            </p>
        </div>
    </div>

    <!-- ══════════════════════════════
         DERECHA — contenido
    ══════════════════════════════ -->
    <div class="w-full lg:w-1/2 xl:w-2/5 h-full overflow-y-auto">
        <div class="min-h-full flex flex-col justify-center items-center px-10 py-12">

            <div class="mb-6 w-full max-w-sm text-center">
                <p class="text-green-600 font-semibold text-sm tracking-widest">ERROR 404</p>

                <h1 class="mt-2 text-gray-900 font-bold text-3xl">
                    Página no encontrada
                </h1>

                <p class="text-gray-400 text-sm mt-3 font-light">
                    Parece que te alejaste del corral...<br>
                    mejor regresa antes de que te pierdas más.
                </p>
            </div>

            <!-- botones -->
            <div class="w-full max-w-sm flex flex-col gap-3 mt-6">

                <a href="javascript:history.back()"
                    class="w-full text-center bg-green-500 hover:bg-green-700 text-white font-semibold text-sm py-3 rounded-xl shadow-lg transition-all">
                    Volver atrás
                </a>
            </div>

            <!-- footer -->
            <div class="mt-16 text-center text-gray-300 text-xs">
                by <span class="font-semibold text-gray-400">CODATECH</span><br>
                &copy; 2026 · La RESpuesta
            </div>

        </div>
    </div>

</body>

</html>
